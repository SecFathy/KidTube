name: safe_tube
description: A safe, YouTube-like video app for children with parental controls.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  youtube_player_flutter: ^9.1.1
  youtube_explode_dart: ^2.3.8
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  timeago: ^3.7.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  path_provider: ^2.1.4
  sqflite: ^2.4.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
